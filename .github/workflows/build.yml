name: Build vince Kernel (KernelSU Stable)

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
- name: 📥 Checkout Source
  uses: actions/checkout@v4

- name: 🧰 Install Dependencies
  run: |
    sudo apt update
    sudo apt install -y \
      git bc bison build-essential curl flex libssl-dev \
      libncurses5-dev libelf-dev python3 unzip zip ccache

- name: 🔧 Clone Clang
  run: |
    git clone --depth=1 https://github.com/XSans0/WeebX-Clang clang

- name: 🧩 Setup KernelSU (proper path)
  run: |
    git clone https://github.com/tiann/KernelSU.git kernelsu
    cd kernelsu
    bash setup.sh $(pwd)/..
    cd ..

- name: ⚙️ Export Env
  run: |
    echo "ARCH=arm64" >> $GITHUB_ENV
    echo "SUBARCH=arm64" >> $GITHUB_ENV
    echo "KBUILD_BUILD_USER=ReLIFE" >> $GITHUB_ENV
    echo "KBUILD_BUILD_HOST=GitHub" >> $GITHUB_ENV
    echo "PATH=$GITHUB_WORKSPACE/clang/bin:$PATH" >> $GITHUB_ENV

- name: 🧹 Clean
  run: |
    make mrproper
    mkdir -p out

- name: ⚙️ Load Defconfig (vince)
  run: |
    make O=out ARCH=arm64 vince_defconfig

- name: 🔧 Fix configs (force KernelSU)
  run: |
    scripts/config --file out/.config \
      -e KSU \
      -e KSU_SELINUX_BYPASS \
      -e TMPFS \
      -e DEVTMPFS

    make O=out ARCH=arm64 olddefconfig

- name: 🛠️ Build Kernel
  run: |
    make -j$(nproc) O=out \
      ARCH=arm64 \
      CC="ccache clang" \
      LLVM=1 \
      LLVM_IAS=1 \
      CLANG_TRIPLE=aarch64-linux-gnu-

- name: ✅ Verify Build Output
  run: |
    if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
      echo "Kernel built successfully"
    else
      echo "Build failed: Image not found"
      exit 1
    fi

- name: 📦 AnyKernel3 Packaging (vince safe)
  run: |
    git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3

    # Copy kernel image safely
    if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
      cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
    elif [ -f out/arch/arm64/boot/Image.gz ]; then
      cp out/arch/arm64/boot/Image.gz AnyKernel3/
    else
      cp out/arch/arm64/boot/Image AnyKernel3/
    fi

    cd AnyKernel3

    # 🔥 vince-safe config
    sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
    sed -i 's/do.modules=1/do.modules=0/g' anykernel.sh
    sed -i 's/device.name1=.*/device.name1=vince/g' anykernel.sh

    # Disable slot issues (important for older devices)
    sed -i 's/slot_select=auto/slot_select=none/g' anykernel.sh

    zip -r9 Kernel-vince-KSU.zip *

- name: ⬆️ Upload Artifact
  uses: actions/upload-artifact@v4
  with:
    name: vince-Kernel
    path: AnyKernel3/Kernel-vince-KSU.zip

name: Vince Kernel CI (Boot Safe + KernelSU)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ARCH: arm64
  SUBARCH: arm64
  KBUILD_BUILD_USER: ReLIFE
  KBUILD_BUILD_HOST: github
  CLANG_PATH: clang

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: 📥 Checkout Kernel Source
      uses: actions/checkout@v4

    - name: ⚙️ Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        bc bison flex curl zip git make \
        libssl-dev libncurses5-dev \
        gcc-aarch64-linux-gnu

    - name: 🔧 Setup Clang (WeebX)
      run: |
        git clone --depth=1 https://github.com/XSans0/WeebX-Clang clang

    - name: 🔥 Add KernelSU (STABLE)
      run: |
        cd $GITHUB_WORKSPACE
        curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -
        cd kernel
        git submodule update --init --recursive || true

    - name: 🧹 Clean Build
      run: |
        rm -rf out

    - name: ⚙️ Load DEFCONFIG (CRITICAL)
      run: |
        cd kernel
        make O=out ARCH=arm64 vince_defconfig

    - name: 🛠️ Build Kernel
      run: |
        cd kernel

        make -j$(nproc) O=out \
        ARCH=arm64 \
        CC=$GITHUB_WORKSPACE/clang/bin/clang \
        CLANG_TRIPLE=aarch64-linux-gnu- \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: 📦 Prepare AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3

        cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/

    - name: 🧩 Fix AnyKernel (Device Name)
      run: |
        sed -i 's/device.name1=.*/device.name1=vince/' AnyKernel3/anykernel.sh

    - name: 📦 Create Flashable ZIP
      run: |
        cd AnyKernel3
        zip -r9 ReLIFE-Kernel-vince.zip *

    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReLIFE-Kernel-vince
        path: AnyKernel3/ReLIFE-Kernel-vince.zip

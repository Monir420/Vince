name: Build Kernel (4.9 Non-GKI + KernelSU)

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
- name: 📥 Checkout Kernel Source
  uses: actions/checkout@v4

- name: 🧰 Install Dependencies
  run: |
    sudo apt update
    sudo apt install -y \
      git bc bison build-essential curl flex libssl-dev \
      libncurses5-dev libelf-dev python3 unzip zip

- name: 🔧 Clone Toolchain (WeebX Clang)
  run: |
    git clone --depth=1 https://github.com/XSans0/WeebX-Clang.git clang

- name: 🧩 Clone KernelSU
  run: |
    git clone https://github.com/tiann/KernelSU.git
    cd KernelSU
    bash setup.sh
    cd ..

- name: ⚙️ Export Environment
  run: |
    echo "ARCH=arm64" >> $GITHUB_ENV
    echo "SUBARCH=arm64" >> $GITHUB_ENV
    echo "KBUILD_BUILD_USER=runner" >> $GITHUB_ENV
    echo "KBUILD_BUILD_HOST=github" >> $GITHUB_ENV
    echo "PATH=$GITHUB_WORKSPACE/clang/bin:$PATH" >> $GITHUB_ENV

- name: 🛠️ Build Kernel
  run: |
    make O=out ARCH=arm64 vince_defconfig
    make -j$(nproc) O=out \
      ARCH=arm64 \
      CC=clang \
      LLVM=1 \
      LLVM_IAS=1

- name: 📦 Create Flashable Zip (AnyKernel3)
  run: |
    git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
    cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/

    cd AnyKernel3
    zip -r9 Kernel.zip *

- name: ⬆️ Upload Artifact
  uses: actions/upload-artifact@v4
  with:
    name: Kernel-Build
    path: AnyKernel3/Kernel.zip
